services:
  mysql:
    image: mariadb:11.4
    restart: always
    env_file:
      - .env
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf

  redis:
    image: redis:7
    restart: always

  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    depends_on:
      - mysql
      - redis
    restart: always

  worker:
    build: ./backend
    env_file:
      - ./backend/.env
    command: poetry run celery -A app.jobs.payment_job worker --loglevel=info
    depends_on:
      - backend
      - redis
    restart: always

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

volumes:
  mysql_data:
    name: mysql_data
